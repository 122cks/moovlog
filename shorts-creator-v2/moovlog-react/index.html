<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shorts Creator" />
  <meta name="description" content="AI 자동 숏폼 영상 생성기 — MOOVLOG Shorts Creator v2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>무브먼트 Shorts Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- SW 캐시 강제 초기화: 모든 모듈 로드 전에 실행 — vendor undefined 오류 완전 차단 -->
  <script>
    (function() {
      var CURRENT_CACHE_VER = 'moovlog-v2.56';
      if (!('caches' in window)) return;
      caches.keys().then(function(keys) {
        var hasOld = keys.some(function(k) { return !k.startsWith(CURRENT_CACHE_VER); });
        if (!hasOld) return;
        // 구버전 캐시 전체 삭제
        return Promise.all(keys.map(function(k) { return caches.delete(k); }))
          .then(function() {
            // SW 전체 재등록
            if (!navigator.serviceWorker) return;
            return navigator.serviceWorker.getRegistrations()
              .then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
              .then(function() {
                // 한 번만 재로드 (무한루프 방지)
                if (sessionStorage.getItem('_sw_cleared') !== '1') {
                  sessionStorage.setItem('_sw_cleared', '1');
                  location.reload(true);
                }
              });
          });
      });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
