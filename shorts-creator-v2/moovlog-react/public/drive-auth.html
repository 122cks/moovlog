<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Drive 로그인 — MOOVLOG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #eee;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 18px; padding: 24px;
    }
    .icon { font-size: 3rem; }
    .title { font-size: 1.1rem; font-weight: 700; }
    .desc  { font-size: 0.85rem; color: #aaa; text-align: center; line-height: 1.6; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #333; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #f87171; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <div class="icon">🔑</div>
  <div class="title">Google 계정으로 로그인</div>
  <div class="desc" id="desc">로그인 창을 불러오는 중입니다...</div>
  <div class="spinner" id="spinner"></div>

  <!-- Google Identity Services — COOP 없이 로드되어 OAuth 팝업 정상 동작 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    var desc    = document.getElementById('desc');
    var spinner = document.getElementById('spinner');

    function showErr(msg) {
      spinner.style.display = 'none';
      desc.textContent      = '오류: ' + msg;
      desc.className        = 'err';
    }

    function doAuth() {
      var params   = new URLSearchParams(location.search);
      var clientId = params.get('cid');
      if (!clientId) { showErr('client_id 파라미터가 없습니다.'); return; }

      desc.textContent = '잠시 후 Google 로그인 창이 열립니다...';

      var client = window.google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: function(resp) {
          if (resp.error) {
            // 사용자가 직접 닫은 경우는 조용히 닫기
            if (resp.error === 'popup_closed_by_user' || resp.error === 'access_denied') {
              desc.textContent = '로그인이 취소되었습니다. 창을 닫아주세요.';
              spinner.style.display = 'none';
              return;
            }
            showErr(resp.error);
            setTimeout(function() { try { window.close(); } catch(e) {} }, 2500);
            return;
          }

          // ✅ 로그인 성공 — localStorage에 토큰 저장 → 메인 탭에서 감지
          try {
            localStorage.setItem('moovlog_drive_token_pending', JSON.stringify({
              token: resp.access_token,
              ts: Date.now()
            }));
          } catch(e) {}

          spinner.style.display = 'none';
          desc.textContent      = '✅ 로그인 완료! 창을 닫는 중...';

          // localStorage 반영 후 창 닫기 (짧은 지연으로 storage 이벤트가 메인 탭에 전달됨)
          setTimeout(function() { try { window.close(); } catch(e) {} }, 400);
        }
      });

      client.requestAccessToken({ prompt: 'select_account' });
    }

    // GIS 스크립트 로딩 대기 (async로 로드되므로 폴링)
    function waitForGIS(cb, attempt) {
      if (window.google && window.google.accounts && window.google.accounts.oauth2) {
        cb();
        return;
      }
      if ((attempt || 0) > 60) { showErr('Google 로그인 라이브러리 로딩 실패'); return; }
      setTimeout(function() { waitForGIS(cb, (attempt || 0) + 1); }, 100);
    }

    waitForGIS(doAuth);
  </script>
</body>
</html>
