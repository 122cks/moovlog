name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_TYPECAST_KEY: ${{ secrets.VITE_TYPECAST_KEY }}
          VITE_TYPECAST_KEY_2: ${{ secrets.VITE_TYPECAST_KEY_2 }}
          VITE_TYPECAST_KEY_3: ${{ secrets.VITE_TYPECAST_KEY_3 }}
          VITE_TYPECAST_KEY_4: ${{ secrets.VITE_TYPECAST_KEY_4 }}
          VITE_TYPECAST_KEY_5: ${{ secrets.VITE_TYPECAST_KEY_5 }}
          VITE_TYPECAST_KEY_6: ${{ secrets.VITE_TYPECAST_KEY_6 }}
          VITE_TYPECAST_KEY_7: ${{ secrets.VITE_TYPECAST_KEY_7 }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: shorts-creator   # /moovlog/shorts-creator/ 경로 유지
