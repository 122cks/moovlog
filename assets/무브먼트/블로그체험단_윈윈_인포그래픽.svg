<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">블로그 체험단 인포그래픽</title>
  <desc id="desc">제품 또는 서비스를 무료로 제공받고 솔직한 후기를 블로그에 작성하는 블로그 체험단의 윈윈 구조를 설명하는 인포그래픽</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2F6"/>
      <stop offset="1" stop-color="#F7F9FC"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00C73C"/>
      <stop offset="1" stop-color="#00A86B"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0B1220" flood-opacity="0.10"/>
    </filter>

    <filter id="soft" x="0" y="0" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B1220" flood-opacity="0.08"/>
    </filter>

    <style>
      .font { font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; }
      .title { font-weight: 800; font-size: 44px; letter-spacing: -0.8px; fill: #111827; }
      .subtitle { font-weight: 600; font-size: 18px; fill: #4B5563; }
      .cardTitle { font-weight: 800; font-size: 22px; fill: #111827; }
      .label { font-weight: 700; font-size: 16px; fill: #111827; }
      .body { font-weight: 600; font-size: 16px; fill: #374151; }
      .small { font-weight: 600; font-size: 14px; fill: #6B7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" rx="36" fill="url(#bg)"/>

  <!-- Header -->
  <g class="font">
    <text x="72" y="110" class="title">블로그 체험단 = Win-Win</text>
    <text x="72" y="148" class="subtitle">제품·서비스 무료 제공 ↔ 솔직 후기 콘텐츠 작성</text>
  </g>

  <!-- Main container -->
  <g filter="url(#shadow)">
    <rect x="60" y="180" width="1080" height="390" rx="28" fill="#FFFFFF"/>
    <rect x="60" y="180" width="1080" height="390" rx="28" stroke="#E5E7EB"/>
  </g>

  <!-- Left card: Business -->
  <g filter="url(#soft)">
    <rect x="96" y="228" width="440" height="294" rx="22" fill="#F9FAFB"/>
    <rect x="96" y="228" width="440" height="294" rx="22" stroke="#EEF2F6"/>
  </g>

  <!-- Right card: Blogger -->
  <g filter="url(#soft)">
    <rect x="664" y="228" width="440" height="294" rx="22" fill="#F9FAFB"/>
    <rect x="664" y="228" width="440" height="294" rx="22" stroke="#EEF2F6"/>
  </g>

  <!-- Center handshake badge -->
  <g filter="url(#soft)">
    <circle cx="600" cy="375" r="82" fill="#FFFFFF"/>
    <circle cx="600" cy="375" r="82" stroke="#E5E7EB"/>
  </g>

  <!-- Accent ring -->
  <circle cx="600" cy="375" r="68" fill="#F1FFF6" stroke="url(#accent)" stroke-width="2"/>

  <!-- Handshake icon (simple) -->
  <g transform="translate(600 375)">
    <!-- left sleeve -->
    <path d="M-64 -4 C-54 -18 -34 -26 -18 -22 C-9 -20 -4 -12 -6 -4 C-10 12 -32 22 -48 18 C-62 14 -72 6 -64 -4Z" fill="#E5E7EB"/>
    <path d="M-58 -2 C-50 -14 -34 -20 -22 -17 C-15 -15 -12 -9 -13 -2 C-15 10 -32 18 -44 15 C-54 12 -64 6 -58 -2Z" fill="#D1D5DB"/>

    <!-- right sleeve -->
    <path d="M64 4 C54 18 34 26 18 22 C9 20 4 12 6 4 C10 -12 32 -22 48 -18 C62 -14 72 -6 64 4Z" fill="#E5E7EB"/>
    <path d="M58 2 C50 14 34 20 22 17 C15 15 12 9 13 2 C15 -10 32 -18 44 -15 C54 -12 64 -6 58 2Z" fill="#D1D5DB"/>

    <!-- hands -->
    <path d="M-16 -2 C-10 -10 2 -12 10 -6 L22 4 C28 10 26 20 18 24 L6 30 C0 34 -8 34 -14 30 L-30 20 C-38 15 -40 5 -34 -2 L-26 -12 C-22 -18 -14 -18 -10 -14" fill="#111827" opacity="0.08"/>
    <path d="M-14 -4 C-9 -10 0 -10 6 -5 L22 8 C26 12 25 18 20 21 L8 28 C4 30 -2 30 -6 28 L-28 16 C-34 12 -34 4 -30 -1 L-22 -10 C-19 -13 -14 -12 -12 -10" fill="#34D399"/>
    <path d="M-5 7 L8 18" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
    <path d="M-14 12 L1 24" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Center text -->
  <g class="font" text-anchor="middle">
    <text x="600" y="464" class="label">윈윈(Win-Win)</text>
    <text x="600" y="488" class="small">서로의 목표를 달성</text>
  </g>

  <!-- Arrows (flow) -->
  <g>
    <!-- left -> center -->
    <path d="M536 328 C560 308 575 296 600 296" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
    <path d="M600 296 L586 286" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
    <path d="M600 296 L586 306" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>

    <!-- center -> right -->
    <path d="M600 454 C625 454 640 442 664 422" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
    <path d="M664 422 L650 412" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
    <path d="M664 422 L650 432" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>

    <!-- right -> center (review back) -->
    <path d="M664 328 C640 348 625 360 600 360" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <path d="M600 360 L614 350" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <path d="M600 360 L614 370" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>

    <!-- center -> left (effect) -->
    <path d="M600 392 C575 392 560 404 536 424" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <path d="M536 424 L550 414" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <path d="M536 424 L550 434" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Flow labels -->
  <g class="font">
    <g>
      <rect x="364" y="252" width="220" height="34" rx="17" fill="#ECFDF5" stroke="#A7F3D0"/>
      <text x="474" y="275" class="small" text-anchor="middle" fill="#065F46">제품·서비스 무료 제공</text>
    </g>
    <g>
      <rect x="616" y="252" width="220" height="34" rx="17" fill="#EFF6FF" stroke="#BFDBFE"/>
      <text x="726" y="275" class="small" text-anchor="middle" fill="#1D4ED8">솔직 후기 콘텐츠 작성</text>
    </g>
  </g>

  <!-- Left: Business content -->
  <g class="font">
    <!-- icon circle -->
    <circle cx="150" cy="276" r="28" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- briefcase icon -->
    <path d="M138 269 C138 266 140 264 143 264 H157 C160 264 162 266 162 269 V270 H138 V269Z" fill="#111827" opacity="0.75"/>
    <rect x="134" y="270" width="32" height="24" rx="6" fill="#111827" opacity="0.10"/>
    <rect x="136" y="272" width="28" height="20" rx="5" fill="#111827" opacity="0.18"/>
    <path d="M146 278 H154" stroke="#111827" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

    <text x="192" y="276" class="cardTitle">사업자 입장</text>
    <text x="120" y="322" class="body">- 적은 비용으로 홍보 효과</text>
    <text x="120" y="350" class="body">- 잠재 고객에게 생생한 후기 전달</text>
    <text x="120" y="378" class="body">- 신뢰 기반의 콘텐츠 마케팅</text>

    <g>
      <rect x="120" y="410" width="392" height="84" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="140" y="438" class="label">얻는 것</text>
      <text x="140" y="466" class="small">브랜드 노출 · 방문/구매 전환 · 후기 자산</text>
    </g>
  </g>

  <!-- Right: Blogger content -->
  <g class="font">
    <!-- icon circle -->
    <circle cx="718" cy="276" r="28" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- laptop + pen icon -->
    <rect x="705" y="262" width="26" height="18" rx="4" fill="#111827" opacity="0.18"/>
    <rect x="708" y="265" width="20" height="12" rx="3" fill="#FFFFFF"/>
    <rect x="702" y="280" width="32" height="6" rx="3" fill="#111827" opacity="0.18"/>
    <path d="M734 268 L744 258" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
    <path d="M742 260 L746 264" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>

    <text x="760" y="276" class="cardTitle">블로거 입장</text>
    <text x="688" y="322" class="body">- 무료 체험으로 콘텐츠 소재 확보</text>
    <text x="688" y="350" class="body">- 솔직 리뷰로 신뢰도 강화</text>
    <text x="688" y="378" class="body">- 원고료 등 부수입 창출 가능</text>

    <g>
      <rect x="688" y="410" width="392" height="84" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="708" y="438" class="label">얻는 것</text>
      <text x="708" y="466" class="small">경험 · 콘텐츠 · 포트폴리오 · 수익</text>
    </g>
  </g>

  <!-- Footer note -->
  <g class="font">
    <text x="72" y="600" class="small">Tip: 무작정 신청보다, 블로그 지수·카테고리에 맞춰 전략적으로 접근하세요.</text>
  </g>
</svg>
