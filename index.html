<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="무브먼트 - 맛집, 여행, 투자, 리뷰">
    <title>무브먼트 - moovlog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 프로필 카드 -->
        <div class="profile-card">
            <div class="share-icon">
                <i class="fas fa-share-alt"></i>
            </div>
            <div class="notification-icon">
                <i class="fas fa-bell"></i>
            </div>
            
            <div class="profile-image">
                <img src="https://via.placeholder.com/120/4FC3F7/FFFFFF?text=무브먼트" alt="무브먼트 프로필">
            </div>
            
            <h1 class="profile-name">무브먼트</h1>
            <p class="profile-subtitle">@이동 블로그 - 맛집·여행·투자·리뷰</p>
            
            <!-- SNS 아이콘들 -->
            <div class="social-icons">
                <a href="YOUR_YOUTUBE_LINK" target="_blank" class="social-icon youtube" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="YOUR_INSTAGRAM_LINK" target="_blank" class="social-icon instagram" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="YOUR_TIKTOK_LINK" target="_blank" class="social-icon tiktok" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="YOUR_BLOG_LINK" target="_blank" class="social-icon naver-blog" title="네이버 블로그">
                    <i class="fas fa-blog"></i>
                </a>
                <a href="YOUR_FACEBOOK_LINK" target="_blank" class="social-icon facebook" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="mailto:YOUR_EMAIL" class="social-icon email" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="tel:YOUR_PHONE" class="social-icon phone" title="Phone">
                    <i class="fas fa-phone"></i>
                </a>
            </div>
            
            <!-- 비즈니스 제안 버튼 -->
            <a href="mailto:YOUR_EMAIL" class="business-button">
                <i class="fas fa-briefcase"></i> 비즈니스 제안
            </a>
        </div>
        
        <!-- 추가 링크 섹션 -->
        <div class="additional-links">
            <a href="YOUR_NAVER_CLIP_LINK" target="_blank" class="link-button naver-clip">
                <i class="fas fa-video"></i>
                <span>네이버 클립</span>
            </a>
        </div>
        
        <!-- 쿠팡 파트너스 제품 리스트 -->
        <div class="products-section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> 블록 리스트</h2>
                <div class="section-actions">
                    <button class="action-btn">북마크</button>
                    <button class="action-btn">편집</button>
                </div>
            </div>
            
            <!-- 제품 카드들 -->
            <div class="product-card">
                <div class="product-badge">링크</div>
                <div class="product-image">
                    <img src="https://via.placeholder.com/80/FFB74D/FFFFFF?text=상품1" alt="CJ제일제당 미트 볼구나 스파게티 2인분">
                </div>
                <div class="product-info">
                    <h3>CJ제일제당 미트 볼구나 스파게티 2인분, 625g, 1개</h3>
                    <div class="product-meta">
                        <span><i class="far fa-heart"></i> 오늘 0</span>
                        <span><i class="fas fa-chart-line"></i> 총 0</span>
                    </div>
                </div>
                <div class="product-actions">
                    <a href="YOUR_COUPANG_LINK_1" target="_blank" class="action-icon shopping">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                    <a href="YOUR_INSTAGRAM_PRODUCT_1" target="_blank" class="action-icon instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
                <div class="product-toggle">
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="product-card">
                <div class="product-badge">링크</div>
                <div class="product-image">
                    <img src="https://via.placeholder.com/80/FF8A65/FFFFFF?text=상품2" alt="와잇딥 진심 감자탕 XL">
                </div>
                <div class="product-info">
                    <h3>와잇딥 진심 감자탕 XL (냉동), 2.5kg, 1개</h3>
                    <div class="product-meta">
                        <span><i class="far fa-heart"></i> 오늘 0</span>
                        <span><i class="fas fa-chart-line"></i> 총 0</span>
                    </div>
                </div>
                <div class="product-actions">
                    <a href="YOUR_COUPANG_LINK_2" target="_blank" class="action-icon shopping">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                    <a href="YOUR_INSTAGRAM_PRODUCT_2" target="_blank" class="action-icon instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
                <div class="product-toggle">
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="product-card">
                <div class="product-badge">링크</div>
                <div class="product-image">
                    <img src="https://via.placeholder.com/80/EF5350/FFFFFF?text=상품3" alt="생생포크 한돈 항정살">
                </div>
                <div class="product-info">
                    <h3>생생포크 한돈 항정살, 300g, 1개</h3>
                    <div class="product-meta">
                        <span><i class="far fa-heart"></i> 오늘 0</span>
                        <span><i class="fas fa-chart-line"></i> 총 1</span>
                    </div>
                </div>
                <div class="product-actions">
                    <a href="YOUR_COUPANG_LINK_3" target="_blank" class="action-icon shopping">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                    <a href="YOUR_INSTAGRAM_PRODUCT_3" target="_blank" class="action-icon instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
                <div class="product-toggle">
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- 인포크 브랜딩 -->
        <div class="inpock-branding">
            <span>나만의 프로필을 만들어보세요</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        
        <!-- 플로팅 추가 버튼 -->
        <button class="floating-add-button" onclick="alert('새로운 링크를 추가할 수 있습니다!')">
            <i class="fas fa-plus"></i>
        </button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
