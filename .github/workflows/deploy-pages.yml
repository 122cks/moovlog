name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── moovlog-react Vite 빌드 ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shorts-creator-v2/moovlog-react/package-lock.json

      - name: Install dependencies
        working-directory: shorts-creator-v2/moovlog-react
        run: npm ci

      - name: Build React app
        working-directory: shorts-creator-v2/moovlog-react
        env:
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          VITE_TYPECAST_KEY: ${{ secrets.TYPECAST_API_KEY }}
          VITE_TYPECAST_KEY_2: ${{ secrets.TYPECAST_API_KEY_2 }}
          VITE_TYPECAST_KEY_3: ${{ secrets.TYPECAST_API_KEY_3 }}
          VITE_TYPECAST_KEY_4: ${{ secrets.TYPECAST_API_KEY_4 }}
          VITE_TYPECAST_KEY_5: ${{ secrets.TYPECAST_API_KEY_5 }}
          VITE_TYPECAST_KEY_6: ${{ secrets.TYPECAST_API_KEY_6 }}
          VITE_TYPECAST_KEY_7: ${{ secrets.TYPECAST_API_KEY_7 }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: npm run build

      - name: Copy build → shorts-creator/
        run: |
          rm -rf shorts-creator
          mkdir -p shorts-creator
          cp -r shorts-creator-v2/moovlog-react/dist/. shorts-creator/

      - name: Remove node_modules (아티팩트 크기 최적화)
        run: rm -rf shorts-creator-v2
      # ────────────────────────────────────────────────────────────

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
