name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject API key from secret
        run: |
          sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_KEY }}|g" shorts-creator/script.js
          sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_KEY }}|g" shorts-creator/index2.html
          sed -i "s|__TYPECAST_API_KEY__|${{ secrets.TYPECAST_API_KEY }}|g" shorts-creator/script.js
          sed -i "s|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g" shorts-creator/index.html
          sed -i "s|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g" shorts-creator/index.html

      - name: Update SW cache version (배포마다 캐시 무효화)
        run: |
          VERSION=$(echo "$GITHUB_SHA" | cut -c1-8)
          sed -i "s|const CACHE = 'moovlog-shorts-[^']*'|const CACHE = 'moovlog-shorts-$VERSION'|g" shorts-creator/sw.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
