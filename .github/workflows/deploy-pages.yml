name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── pre-built dist/ 를 그대로 복사 (CI 빌드 없음) ──────────
      - name: Prepare _site staging directory
        run: |
          mkdir -p _site/shorts-creator
          # 루트 랜딩 페이지
          cp index.html style.css script.js _site/
          # assets (루트 index.html이 참조하는 이미지/영상)
          cp -r assets _site/assets
          # React 앱 빌드 결과물만 복사
          cp -r shorts-creator-v2/moovlog-react/dist/. _site/shorts-creator/
      # ────────────────────────────────────────────────────────────

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
