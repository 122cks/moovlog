name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. moovlog-react Vite 빌드 ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shorts-creator-v2/moovlog-react/package-lock.json

      - name: Install dependencies
        working-directory: shorts-creator-v2/moovlog-react
        run: npm install

      - name: Build React app
        working-directory: shorts-creator-v2/moovlog-react
        env:
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          VITE_TYPECAST_KEY: ${{ secrets.TYPECAST_API_KEY }}
          VITE_TYPECAST_KEY_2: ${{ secrets.TYPECAST_API_KEY_2 }}
          VITE_TYPECAST_KEY_3: ${{ secrets.TYPECAST_API_KEY_3 }}
          VITE_TYPECAST_KEY_4: ${{ secrets.TYPECAST_API_KEY_4 }}
          VITE_TYPECAST_KEY_5: ${{ secrets.TYPECAST_API_KEY_5 }}
          VITE_TYPECAST_KEY_6: ${{ secrets.TYPECAST_API_KEY_6 }}
          VITE_TYPECAST_KEY_7: ${{ secrets.TYPECAST_API_KEY_7 }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: npm run build

      # ── 2. 최소 스테이징 디렉터리 구성 (node_modules 미포함) ────
      - name: Prepare _site staging directory
        run: |
          mkdir -p _site/shorts-creator
          # 루트 랜딩 페이지
          cp index.html style.css script.js _site/
          # assets (루트 index.html이 참조하는 이미지/영상)
          cp -r assets _site/assets
          # React 앱 빌드 결과물만 복사
          cp -r shorts-creator-v2/moovlog-react/dist/. _site/shorts-creator/
      # ────────────────────────────────────────────────────────────

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
