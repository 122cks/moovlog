name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # peaceiris 가 gh-pages 브랜치에 push 하려면 write 필요

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── React 앱 빌드 (GEMINI_KEY2 주입) ──────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build React app
        working-directory: shorts-creator-v2/moovlog-react
        env:
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_KEY2 }}
          VITE_TYPECAST_KEY: ${{ secrets.VITE_TYPECAST_KEY }}
          VITE_TYPECAST_KEY_2: ${{ secrets.VITE_TYPECAST_KEY_2 }}
          VITE_TYPECAST_KEY_3: ${{ secrets.VITE_TYPECAST_KEY_3 }}
          VITE_TYPECAST_KEY_4: ${{ secrets.VITE_TYPECAST_KEY_4 }}
          VITE_TYPECAST_KEY_5: ${{ secrets.VITE_TYPECAST_KEY_5 }}
          VITE_TYPECAST_KEY_6: ${{ secrets.VITE_TYPECAST_KEY_6 }}
          VITE_TYPECAST_KEY_7: ${{ secrets.VITE_TYPECAST_KEY_7 }}
        run: |
          npm install
          npm run build

      # ── _site 디렉토리 구성 ────────────────────────────────────
      - name: Prepare _site
        run: |
          mkdir -p _site/shorts-creator
          cp index.html style.css script.js _site/
          cp -r assets _site/assets 2>/dev/null || true
          cp -r shorts-creator-v2/moovlog-react/dist/. _site/shorts-creator/

      # ── gh-pages 브랜치에 직접 푸시 (사이트 실제 반영) ─────────
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
