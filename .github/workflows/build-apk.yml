name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

      - name: Set Android SDK path
        working-directory: android-app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Bootstrap Gradle 8.4 wrapper
        working-directory: android-app
        run: |
          echo "=== Downloading Gradle 8.4 ==="
          curl -sSL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle-8.4.zip
          unzip -q /tmp/gradle-8.4.zip -d /tmp/
          chmod +x /tmp/gradle-8.4/bin/gradle
          echo "=== Generating gradlew ==="
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          echo "=== Wrapper files ==="
          ls -la gradlew gradle/wrapper/
          echo "=== gradlew version ==="
          ./gradlew --version 2>&1 | head -10

      - name: Generate keystore
        working-directory: android-app
        run: |
          keytool -genkey -v -keystore moovlog.keystore -alias moovlog -keyalg RSA -keysize 2048 -validity 36500 -storepass moovlog2024 -keypass moovlog2024 -dname "CN=Moovlog,OU=App,O=Moovlog,L=Seoul,S=Seoul,C=KR"

      - name: Check wrapper files
        working-directory: android-app
        run: |
          echo "=== gradlew ==="
          ls -la gradlew || echo "gradlew not found!"
          echo "=== ANDROID_HOME ==="
          echo "$ANDROID_HOME"
          echo "=== local.properties ==="
          cat local.properties || echo "not found"

      - name: Build release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx2g 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android-app/build.log
          retention-days: 7

      - name: Copy APK
        run: |
          APK_PATH=$(find android-app -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file found after build"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" moovlog-shorts-creator.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moovlog-shorts-creator
          path: moovlog-shorts-creator.apk
          retention-days: 90

      - name: Delete old release
        run: |
          gh release delete apk-latest --yes 2>/dev/null || true
          git push --delete origin apk-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Moovlog Shorts Creator APK"
          body: |
            ## Install
            1. Download moovlog-shorts-creator.apk
            2. Settings > Security > Allow unknown apps
            3. Tap APK > Install

            Web: https://122cks.github.io/moovlog/shorts-creator/
          files: moovlog-shorts-creator.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
