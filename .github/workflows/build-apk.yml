name: 📱 Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'shorts-creator/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build TWA APK
    runs-on: ubuntu-latest

    steps:
      # ── 1) 체크아웃 ────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2) SVG → PNG 아이콘 변환 ───────────────────────────
      - name: Convert SVG icons to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 shorts-creator/icon-512.svg \
            -o shorts-creator/icon-512.png
          rsvg-convert -w 192 -h 192 shorts-creator/icon-192.svg \
            -o shorts-creator/icon-192.png

      # ── 3) Node.js 설정 ────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 4) JDK 17 설정 ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 5) Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      # ── 6) Bubblewrap CLI ──────────────────────────────────
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.14.1

      # ── 7) 서명용 키스토어 생성 ─────────────────────────────
      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore moovlog.keystore \
            -alias moovlog \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass moovlog2024 -keypass moovlog2024 \
            -dname "CN=Moovlog, OU=App, O=Moovlog, L=Seoul, S=Seoul, C=KR"
          echo "Keystore SHA256 fingerprint:"
          keytool -list -v -keystore moovlog.keystore \
            -alias moovlog -storepass moovlog2024 \
            | grep SHA256

      # ── 8) TWA Manifest 생성 ───────────────────────────────
      - name: Create twa-manifest.json
        run: |
          ICON_BASE="https://raw.githubusercontent.com/${{ github.repository }}/main/shorts-creator/icon-512.png"
          cat > twa-manifest.json << EOF
          {
            "packageId": "com.moovlog.shorts",
            "host": "122cks.github.io",
            "name": "무브먼트 Shorts Creator",
            "launcherName": "Moovlog",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0d0d0d",
            "navigationColor": "#0d0d0d",
            "navigationColorDark": "#0d0d0d",
            "navigationDividerColor": "#0d0d0d",
            "navigationDividerColorDark": "#0d0d0d",
            "backgroundColor": "#0d0d0d",
            "enableNotifications": false,
            "startUrl": "/moovlog/shorts-creator/",
            "iconUrl": "${ICON_BASE}",
            "maskableIconUrl": "${ICON_BASE}",
            "monochromeIconUrl": "${ICON_BASE}",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "moovlog.keystore",
              "alias": "moovlog"
            },
            "storePassword": "moovlog2024",
            "keyPassword": "moovlog2024",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "generatorAppVersion": "1.14.1",
            "sdkVersion": {
              "minSdkVersion": 24,
              "compileSdkVersion": 34,
              "targetSdkVersion": 34
            },
            "features": {},
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://122cks.github.io/moovlog/shorts-creator/"
          }
          EOF

      # ── 9) APK 빌드 ────────────────────────────────────────
      - name: Build APK (Bubblewrap)
        run: |
          mkdir -p twa-build
          cp moovlog.keystore twa-build/
          cp twa-manifest.json twa-build/
          cd twa-build
          bubblewrap build --skipPwaValidation \
            --storePassword moovlog2024 \
            --keyPassword moovlog2024
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 10) APK 파일 찾기 ──────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find twa-build -name "*.apk" | sort | tail -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      # ── 11) Artifact 업로드 ────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: moovlog-shorts-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      # ── 12) GitHub Release 생성 ────────────────────────────
      - name: Rename APK
        run: cp "${{ steps.apk.outputs.path }}" moovlog-shorts-creator.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "📱 무브먼트 Shorts Creator APK"
          body: |
            ## 무브먼트 Shorts Creator — Android 앱

            ### ⬇️ 설치 방법
            1. **아래 `moovlog-shorts-creator.apk` 다운로드**
            2. 안드로이드: 설정 → 보안 → **알 수 없는 앱 설치 허용**
            3. 다운로드 폴더에서 APK 실행 → 설치

            > Android 7.0 (API 24) 이상에서 실행됩니다.

            ### ✨ 주요 기능
            - 이미지/영상 업로드 → **Gemini Vision AI 자동 분석**
            - 음식점 이름만 넣으면 **숏폼 영상 자동 완성**
            - **AI 나레이션 (한국어 남성)** + 자막 자동 생성
            - **WebM 영상 다운로드** (자막 포함)

            ### 🌐 웹 버전
            https://122cks.github.io/moovlog/shorts-creator/

            ---
            Build: ${{ github.sha }} · ${{ github.run_number }}
          files: moovlog-shorts-creator.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
