name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

      - name: Set Android SDK path
        working-directory: android-app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore
        working-directory: android-app
        run: |
          keytool -genkey -v -keystore moovlog.keystore -alias moovlog -keyalg RSA -keysize 2048 -validity 36500 -storepass moovlog2024 -keypass moovlog2024 -dname "CN=Moovlog,OU=App,O=Moovlog,L=Seoul,S=Seoul,C=KR"

      - name: Build release APK
        working-directory: android-app
        run: |
          set -o pipefail
          gradle :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android-app/build.log
          retention-days: 7

      - name: Copy APK
        run: |
          echo "=== Searching for APK files ==="
          find android-app -name "*.apk" -type f 2>/dev/null || true
          echo "=== Build outputs ==="
          ls -laR android-app/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          APK_PATH="android-app/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH=$(find android-app -name "*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "::error::No APK file found"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" moovlog-shorts-creator.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moovlog-shorts-creator
          path: moovlog-shorts-creator.apk
          retention-days: 90

      - name: Delete old release
        run: |
          gh release delete apk-latest --yes 2>/dev/null || true
          git push --delete origin apk-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Moovlog Shorts Creator APK"
          body: |
            ## Install
            1. Download moovlog-shorts-creator.apk
            2. Settings > Security > Allow unknown apps
            3. Tap APK > Install

            Web: https://122cks.github.io/moovlog/shorts-creator/
          files: moovlog-shorts-creator.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
