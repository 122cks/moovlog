name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Generate keystore
        working-directory: android-app
        run: |
          keytool -genkey -v -keystore moovlog.keystore -alias moovlog -keyalg RSA -keysize 2048 -validity 36500 -storepass moovlog2024 -keypass moovlog2024 -dname "CN=Moovlog,OU=App,O=Moovlog,L=Seoul,S=Seoul,C=KR"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Set Android SDK path
        working-directory: android-app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build release APK
        working-directory: android-app
        run: gradle assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx2g
        env:
          KEYSTORE_PATH: moovlog.keystore
          STORE_PASS: moovlog2024
          KEY_ALIAS: moovlog
          KEY_PASS: moovlog2024

      - name: Copy APK
        run: cp $(find android-app -name "*.apk" | tail -1) moovlog-shorts-creator.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moovlog-shorts-creator
          path: moovlog-shorts-creator.apk
          retention-days: 90

      - name: Delete old release
        run: |
          gh release delete apk-latest --yes 2>/dev/null || true
          git push --delete origin apk-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "무브먼트 Shorts Creator APK"
          body: |
            ## 설치 방법
            1. moovlog-shorts-creator.apk 다운로드
            2. 설정 > 보안 > 알 수 없는 앱 허용
            3. APK 탭 > 설치

            웹 버전: https://122cks.github.io/moovlog/shorts-creator/
          files: moovlog-shorts-creator.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

